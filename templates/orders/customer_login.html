{% extends 'orders/customer_base.html' %}
{% block title %} SignIn–CherryMichelle's{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 0 auto">
  <div class="page-title">Welcome Back</div>
  <p class="page-sub">Sign in to manage your orders</p>
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter your username"
            autofocus
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter your password"
          />
        </div>
        <button
          type="submit"
          class="btn btn-primary"
          style="width: 100%; justify-content: center; margin-top: 8px"
        >
          Sign In
        </button>
      </form>
      <p
        style="
          text-align: center;
          margin-top: 16px;
          font-size: 0.85rem;
          color: var(--text-light);
        "
      >
        No account yet?
        <a
          href="{% url 'customer_register' %}"
          style="color: var(--rose); font-weight: 700"
          >Create one</a
        >
      </p>
    </div>
  </div>
</div>
{% endblock %}
