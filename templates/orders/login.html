<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Cherry Michelle's Cakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #8b2f42 0%, #5c3d2e 60%, #c8536a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .floating-cakes {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .float-item {
            position: absolute;
            font-size: 2rem;
            opacity: 0.15;
            animation: floatUp 8s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 48px 44px;
            width: 400px;
            max-width: 95vw;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
            position: relative;
            z-index: 10;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            color: #8b2f42;
            font-weight: 700;
            line-height: 1.2;
        }

        .login-sub {
            color: #a07050;
            font-size: 0.82rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 700;
            font-size: 0.83rem;
            color: #5c3d2e;
            letter-spacing: 0.3px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0c8c8;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #3d2314;
            background: #fdf6f0;
            transition: all 0.2s;
            font-family: 'Lato', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #c8536a;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(200,83,106,0.12);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #c8536a, #8b2f42);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            margin-top: 8px;
            font-family: 'Lato', sans-serif;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(200,83,106,0.35);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(200,83,106,0.45);
        }

        .error-msg {
            background: #f8d7da;
            color: #842029;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            border-left: 3px solid #dc3545;
        }

        .divider {
            text-align: center;
            color: #a07050;
            font-size: 0.78rem;
            margin: 20px 0 4px;
        }
    </style>
</head>
<body>
    <div class="floating-cakes">
        <span class="float-item" style="left:10%; animation-delay:0s; animation-duration:9s;">🎂</span>
        <span class="float-item" style="left:25%; animation-delay:2s; animation-duration:11s;">🧁</span>
        <span class="float-item" style="left:45%; animation-delay:4s; animation-duration:8s;">🍰</span>
        <span class="float-item" style="left:65%; animation-delay:1s; animation-duration:12s;">🎂</span>
        <span class="float-item" style="left:80%; animation-delay:3s; animation-duration:10s;">🧁</span>
        <span class="float-item" style="left:90%; animation-delay:6s; animation-duration:9s;">🍰</span>
    </div>

    <div class="login-card">
        <div class="login-brand">
            <span class="login-icon">🎂</span>
            <div class="login-title">Cherry Michelle's<br>Cakes & Pastries</div>
            <div class="login-sub">Staff Portal</div>
        </div>

        {% if form.errors %}
        <div class="error-msg">⚠️ Invalid username or password. Please try again.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">👤 Username</label>
                <input type="text" name="username" id="id_username" autocomplete="username" autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="id_password">🔒 Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-login">Sign In to Cakery →</button>
        </form>

        <div class="divider">🌸 Made with love & flour 🌸</div>
    </div>
</body>
</html>
