{% extends 'orders/base.html' %}
{% block title %}Confirm Delete – Cakery{% endblock %}
{% block topbar_title %}Confirm Delete{% endblock %}

{% block content %}
<div style="max-width:480px; margin:40px auto; text-align:center;">
    <div class="card">
        <div class="card-body" style="padding:40px;">
            <div style="font-size:3rem; margin-bottom:16px;"></div>
            <h2 style="font-family:'Playfair Display',serif; color:var(--rose-dark); margin-bottom:12px;">Delete Confirmation</h2>
            <p style="color:var(--text-light); margin-bottom:24px;">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
            <form method="post" style="display:flex; gap:12px; justify-content:center;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url back_url %}" class="btn btn-outline">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
